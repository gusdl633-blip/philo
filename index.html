<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111111">
<title>Philo — 오늘의 철학</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#111111; --bg-card:#1C1C1C; --bg-ele:#2A2A2A;
  --border:#2F2F2F; --border-h:#404040;
  --accent:#D9FF9A; --accent-dim:rgba(217,255,154,0.1); --accent-border:rgba(217,255,154,0.28); --accent-text:#111;
  --t1:#F2F2F2; --t2:#BBBBBB; --t3:#777777;
  --ff:'Noto Sans KR',sans-serif; --fs:'Noto Serif KR',serif;
  --r-sm:10px; --r-md:14px; --r-lg:20px; --r-pill:100px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#0a0a0a;font-family:var(--ff);min-height:100%}
body{display:flex;justify-content:center;min-height:100vh;padding:0}
@media(min-width:500px){
  body{align-items:flex-start;padding:28px 16px 56px}
  .phone{width:430px;border-radius:50px;box-shadow:0 0 0 0.5px #2a2a2a,0 50px 140px rgba(0,0,0,0.85);overflow:hidden}
  .notch{width:130px;height:36px;background:#0a0a0a;border-radius:0 0 22px 22px;margin:0 auto;position:relative;z-index:10}
}
@media(max-width:499px){
  .phone{width:100%;border-radius:0}
  .notch{display:none}
}
.phone{background:var(--bg);position:relative}
.orbs{position:absolute;top:0;left:0;right:0;height:300px;pointer-events:none;overflow:hidden;z-index:0}
.orb{position:absolute;border-radius:50%;filter:blur(60px)}
.orb1{width:250px;height:250px;top:-80px;left:-60px;background:radial-gradient(circle,rgba(74,124,89,0.55),transparent 70%)}
.orb2{width:200px;height:200px;top:-60px;right:-40px;background:radial-gradient(circle,rgba(143,184,74,0.38),transparent 70%)}
.orb3{width:160px;height:160px;top:100px;left:50%;transform:translateX(-50%);background:radial-gradient(circle,rgba(217,255,154,0.08),transparent 70%)}
.inner{position:relative;z-index:1}
.scroll-area{max-height:100svh;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.scroll-area::-webkit-scrollbar{display:none}
@media(min-width:500px){.scroll-area{max-height:900px}}
.screen{display:none}
.screen.active{display:block}
.hdr{padding:20px 22px 16px;display:flex;align-items:center;justify-content:space-between}
.logo-row{display:flex;align-items:center;gap:12px}
.logo{width:38px;height:38px;background:var(--bg-ele);border:0.5px solid var(--border-h);border-radius:11px;display:flex;align-items:center;justify-content:center;font-family:var(--fs);font-size:17px;font-weight:300;color:var(--accent);flex-shrink:0}
.aname{font-size:17px;font-weight:500;color:var(--t1);letter-spacing:-0.3px}
.asub{font-size:12px;color:var(--t3);margin-top:2px;letter-spacing:0.3px}
.streak{display:flex;align-items:center;gap:5px;background:rgba(217,255,154,0.1);border:0.5px solid var(--accent-border);color:var(--accent);font-size:13px;font-weight:500;padding:6px 14px;border-radius:var(--r-pill)}
.body{padding:4px 18px 32px;display:flex;flex-direction:column;gap:13px}
.date-row{display:flex;align-items:center;justify-content:space-between;padding:0 2px}
.date-txt{font-size:13px;color:var(--t3);letter-spacing:0.3px}
.cat-pill{font-size:12px;font-weight:500;padding:4px 14px;border-radius:var(--r-pill);background:var(--accent-dim);color:var(--accent);border:0.5px solid var(--accent-border)}
.passage-card{background:var(--bg-card);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:22px 20px 20px;transition:border-color 0.2s}
.book-row{display:flex;align-items:center;gap:11px;margin-bottom:16px}
.book-ico{width:36px;height:36px;border-radius:9px;background:var(--bg-ele);border:0.5px solid var(--border-h);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.book-title{font-size:13px;font-weight:500;color:var(--t1)}
.book-author{font-size:12px;color:var(--t3);margin-top:3px}
.passage-text{font-family:var(--fs);font-size:16px;font-weight:400;line-height:2.1;color:var(--t1);word-break:keep-all;border-left:2px solid rgba(217,255,154,0.38);padding-left:16px;border-radius:0}
.ctx-box{background:var(--bg-card);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:17px 18px}
.slbl{font-size:11px;font-weight:500;color:var(--t3);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:9px}
.ctx-text{font-size:14px;line-height:1.9;color:var(--t2);word-break:keep-all}
.kw-row{display:flex;gap:6px;flex-wrap:wrap;padding:0 2px}
.kw{font-size:12px;font-weight:500;padding:5px 13px;border-radius:var(--r-pill);background:var(--bg-ele);color:var(--t2);border:0.5px solid var(--border-h);cursor:pointer;transition:all 0.15s}
.kw:hover,.kw:active{border-color:var(--accent-border);color:var(--accent)}
.act-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.abtn{padding:14px;border:0.5px solid var(--border-h);border-radius:var(--r-md);background:transparent;font-family:var(--ff);font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all 0.15s;min-height:52px}
.abtn:hover,.abtn:active{border-color:var(--accent-border);color:var(--accent);background:var(--accent-dim)}
.abtn.saved{border-color:var(--accent-border);color:var(--accent);background:var(--accent-dim)}
.abtn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.shuffle-btn{width:100%;padding:16px;border-radius:var(--r-pill);background:var(--accent);font-family:var(--ff);font-size:14px;font-weight:500;color:var(--accent-text);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;border:none;transition:opacity 0.15s,transform 0.1s;min-height:54px}
.shuffle-btn:hover{opacity:0.9}
.shuffle-btn:active{transform:scale(0.98)}
.shuffle-btn svg{width:16px;height:16px;stroke:var(--accent-text);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.divider{border:none;border-top:0.5px solid var(--border)}
.sec-hdr{font-size:13px;font-weight:500;color:var(--t2);padding:0 2px}
.cgrid{display:flex;flex-direction:column;gap:10px}
.ccard{background:var(--bg-card);border:0.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;cursor:pointer;transition:border-color 0.15s}
.ccard:hover,.ccard:active{border-color:var(--border-h)}
.chdr{padding:15px 17px;display:flex;align-items:center;justify-content:space-between}
.cleft{display:flex;align-items:center;gap:12px}
.cicon{width:38px;height:38px;border-radius:10px;background:var(--bg-ele);border:0.5px solid var(--border-h);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ctitle{font-size:15px;font-weight:500;color:var(--t1)}
.csub{font-size:12px;color:var(--t3);margin-top:3px}
.carr{font-size:20px;color:var(--t3)}
.cpills{padding:0 17px 14px;display:flex;gap:6px;flex-wrap:wrap}
.cpill{font-size:12px;padding:4px 11px;border-radius:var(--r-pill);border:0.5px solid var(--border-h);color:#C0C0C0;background:var(--bg-ele);white-space:nowrap}
.det-body{padding:16px 18px 32px;display:flex;flex-direction:column;gap:12px}
.backbtn{display:flex;align-items:center;gap:7px;background:none;border:none;font-family:var(--ff);font-size:14px;color:var(--t2);cursor:pointer;padding:0;transition:color 0.12s;min-height:44px}
.backbtn:hover,.backbtn:active{color:var(--accent)}
.backbtn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.dhdr{border-radius:var(--r-lg);padding:16px;display:flex;align-items:center;gap:13px;background:var(--bg-card);border:0.5px solid var(--border)}
.dico{width:46px;height:46px;border-radius:12px;background:var(--bg-ele);border:0.5px solid var(--border-h);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.dtitle{font-size:17px;font-weight:500;color:var(--t1)}
.dsub{font-size:12px;color:var(--t2);margin-top:4px;line-height:1.5}
.bcard{background:var(--bg-card);border:0.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;transition:border-color 0.15s}
.bcard:hover{border-color:var(--border-h)}
.btop{display:flex;align-items:center;gap:11px;padding:15px 16px 12px}
.bico2{width:36px;height:36px;border-radius:9px;background:var(--bg-ele);border:0.5px solid var(--border-h);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.bname{font-size:14px;font-weight:500;color:var(--t1)}
.bauth{font-size:12px;color:var(--t3);margin-top:2px}
.bpassages{display:flex;flex-direction:column}
.bp-item{padding:14px 16px;border-top:0.5px solid var(--border);cursor:pointer;transition:background 0.15s}
.bp-item:hover,.bp-item:active{background:rgba(217,255,154,0.04)}
.bp-num{font-size:10px;font-weight:500;color:var(--accent);letter-spacing:0.5px;margin-bottom:5px}
.bp-text{font-family:var(--fs);font-size:13px;line-height:1.8;color:var(--t2);word-break:keep-all;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp 0.22s ease forwards}
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div class="orbs"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div>
  <div class="inner">
    <div class="scroll-area">
      <div class="screen active" id="scr-main">
        <div class="hdr">
          <div class="logo-row">
            <div class="logo">◈</div>
            <div><div class="aname">Philo</div><div class="asub">오늘의 철학</div></div>
          </div>
          <div class="streak">🔥 7일 연속</div>
        </div>
        <div class="body">
          <div class="date-row">
            <div class="date-txt" id="today-date"></div>
            <div class="cat-pill" id="today-cat"></div>
          </div>
          <div class="passage-card fade" id="passage-card">
            <div class="book-row">
              <div class="book-ico" id="today-ico"></div>
              <div><div class="book-title" id="today-book"></div><div class="book-author" id="today-author"></div></div>
            </div>
            <div class="passage-text" id="today-passage"></div>
          </div>
          <div class="ctx-box">
            <div class="slbl">이 문구에 대해</div>
            <div class="ctx-text" id="today-ctx"></div>
          </div>
          <div class="kw-row" id="today-kw"></div>
          <div class="act-row">
            <button class="abtn" id="save-btn" onclick="toggleSave()">
              <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
              <span id="save-lbl">저장하기</span>
            </button>
            <button class="abtn" onclick="deepDive()">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              더 알아보기
            </button>
          </div>
          <button class="shuffle-btn" onclick="shufflePassage()">
            <svg viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
            다른 문구 보기
          </button>
          <hr class="divider">
          <div class="sec-hdr">카테고리</div>
          <div class="cgrid" id="cgrid"></div>
        </div>
      </div>
      <div class="screen" id="scr-detail">
        <div class="hdr">
          <div class="logo-row">
            <div class="logo">◈</div>
            <div><div class="aname">Philo</div><div class="asub">오늘의 철학</div></div>
          </div>
          <div class="streak">🔥 7일 연속</div>
        </div>
        <div class="det-body">
          <button class="backbtn" onclick="goBack()">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
            전체 카테고리
          </button>
          <div class="dhdr" id="dhdr"></div>
          <div id="plist" style="display:flex;flex-direction:column;gap:10px"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const cats=[
  {id:'sad',icon:'🌧',title:'우울할 땐',sub:'무기력·슬픔·공허함이 찾아올 때',books:[
    {book:'니체의 말',author:'프리드리히 니체',ico:'⚡',cat:'우울할 땐',ctx:'니체는 고통을 회피하지 않고 극복의 연료로 삼았다. 우울함은 약함이 아니라 깊이 느끼는 자의 대가이며, 위버멘쉬로 나아가는 통과 의례다.',kw:['위버멘쉬','극복','고통','변화'],passages:['인간은 극복되어야 할 무언가다. 그대들은 벌레에서 인간이 되기까지 무엇을 해왔는가? 많은 것들이 그대들 안에서 여전히 벌레다.','나를 죽이지 않는 것은 나를 더 강하게 만든다. 고통은 삶의 교사다.','춤을 추지 않는 날은 낭비된 날이다. 기쁨을 잃지 마라, 그것이 곧 힘이다.','깊은 곳에서 생각하는 자는 깊이 고통받는다. 그러나 그것이 그를 더 깊은 곳으로 이끈다.','우리가 가장 잘 잊는 것은 바로 우리 자신이다. 자신을 사랑하는 법을 배워라.','고통 없이 위대함은 없다. 상처는 빛이 들어오는 곳이다.','모든 위대한 것들은 먼저 무서운 것으로 보인다. 두려움은 위대함의 문 앞에 서 있는 파수꾼이다.','당신이 심연을 오래 바라보면, 심연도 당신을 바라본다. 그러나 눈을 돌리지 마라.','창조한다는 것은 파괴하는 것이기도 하다. 새로운 자신을 만들기 위해 낡은 자신을 허물어라.','지금 이 고통이 영원히 반복된다 해도, 나는 그것을 긍정할 수 있는가? 그것이 삶을 긍정하는 방식이다.']},
    {book:'페스트',author:'알베르 카뮈',ico:'🌊',cat:'우울할 땐',ctx:'카뮈는 부조리한 세계 앞에서도 저항하고 연대하는 인간의 모습을 그렸다. 오늘 하루 버티는 것이 이미 충분한 용기라는 역설적 위로다.',kw:['부조리','저항','연대','인간'],passages:['부조리한 세계에 맞서 저항하는 것. 패배할 것을 알면서도 싸우는 것. 단지 인간이 되는 것. 그것만으로도 충분하다.','우리는 모두 페스트를 안고 산다. 중요한 것은 자신 안의 페스트를 인식하는 것이다.','고통 중에도 인간은 아름다움을 향한 욕망을 잃지 않는다. 그것이 인간이 짐승과 다른 이유다.','절망은 사치다. 살아있는 한 우리는 싸울 수 있다.','사랑한다는 것은 함께 같은 방향을 바라보는 것이다.','진정한 관대함이란 미래의 세대에게 모든 것을 바치는 것이다.','행복을 추구하는 것을 부끄러워하지 마라. 행복은 저항의 한 형태다.','이 세계에는 전염병 이상의 것들이 있다. 인간의 어리석음, 그리고 인간의 용기가 그것이다.','우리가 서로에게 배울 수 있는 것이 있다면, 그것은 바로 서로를 해치지 않는 법이다.','고통은 나눌 수 없다. 그러나 함께 고통을 인식하는 것은 가능하다. 그것이 연대다.']},
    {book:'죽음의 수용소에서',author:'빅터 프랭클',ico:'✦',cat:'우울할 땐',ctx:'아우슈비츠 생존자 프랭클은 극한의 고통 속에서도 의미를 찾을 수 있다는 것을 몸으로 증명했다. 마지막 자유는 태도를 선택하는 자유다.',kw:['의미','자유','태도','로고테라피'],passages:['모든 것을 빼앗길 수 있다. 인간의 마지막 자유, 즉 주어진 환경에서 자신의 태도를 선택하는 자유만 빼고는.','삶이 당신에게 무엇을 기대하는지 물어라. 당신이 삶에 무엇을 기대하는지 말고.','고통에도 의미가 있다면, 그것은 더 이상 고통이 아니다.','인간은 어떤 상황에서도 자신의 태도를 선택할 수 있다. 그것이 인간의 위엄이다.','의미를 찾는 것이 인간의 가장 근본적인 동기다. 쾌락도, 권력도 그 다음이다.','살아남은 자는 특별한 사람이 아니었다. 내일 무언가 기다리는 것이 있는 사람이었다.','사랑은 인간이 다른 인간의 가장 깊은 본질로 들어갈 수 있는 유일한 방법이다.','우리는 고통의 의미를 선택할 수 없다. 하지만 고통에 반응하는 방식은 선택할 수 있다.','과거는 빼앗길 수 없다. 내가 이미 살아낸 것들은 영원히 내 것이다.','삶의 의미는 주어지는 것이 아니라 발견하는 것이다. 그 발견의 여정이 곧 삶이다.']},
    {book:'의지와 표상으로서의 세계',author:'쇼펜하우어',ico:'🪞',cat:'우울할 땐',ctx:'쇼펜하우어의 염세주의는 고통을 직시함으로써 오히려 연민과 예술 속에서 해방을 찾는 역설적 위로다.',kw:['고통','의지','인식','해방'],passages:['삶은 고통이다. 존재 자체가 결핍이며, 욕망은 채워지면 곧 권태가 된다. 그러나 이 진실을 응시하는 자는 더 이상 세상에 속지 않는다.','인간의 불행의 근원은 혼자 있지 못하는 것이다. 고독을 즐길 줄 아는 자만이 자유롭다.','삶이 꿈이라면, 죽음은 깨어남이다. 두려워할 것이 없다.','거의 모든 불행은 비교에서 온다. 자신의 삶을 타인의 것과 비교하지 마라.','음악은 다른 예술들과 달리 의지 자체의 표현이다. 그래서 음악 앞에서 우리는 본질과 만난다.','고통받는 자에 대한 연민, 그것이 도덕의 유일한 기초다.','재능은 다른 이들이 맞히지 못하는 표적을 맞힌다. 천재는 다른 이들이 보지 못하는 표적을 본다.','독서는 다른 이의 머리로 생각하는 것이다. 스스로 생각하는 시간을 더 가져라.','부는 바닷물과 같다. 마실수록 목이 마르다.','지금 이 순간을 살아라. 과거를 후회하고 미래를 걱정하는 사이에 현재가 사라진다.']},
    {book:'육조단경',author:'혜능',ico:'☯',cat:'우울할 땐',ctx:'선종 6조 혜능은 마음의 본성이 본래 청정함을 강조했다. 우울이 찾아올 때 그것은 실체가 없는 먼지임을 상기시킨다.',kw:['선종','공','본성','마음'],passages:['본래 한 물건도 없는데 어디에 먼지가 앉으랴. 마음이 곧 부처다.','미혹하면 중생이요, 깨치면 부처다. 차이는 오직 한 생각에 있다.','자성이 청정하니 스스로 깨달아라. 밖에서 구하지 마라.','마음이 흔들리지 않으면 사방이 다 선정이다.','번뇌가 곧 보리다. 고통이 곧 깨달음의 문이다.','한 생각 일어나기 전이 본래면목이다. 그것을 보라.','자성의 반야로 관조하면 안과 밖이 명철하여 자신의 본심을 안다.','말로 전할 수 없는 것이 있다. 그것이 진짜다.','선악을 생각하지 말라. 그 순간 본래면목이 드러난다.','일체 만법이 자성을 떠나지 않는다. 마음 밖에서 구하는 것은 모두 헛되다.']}
  ]},
  {id:'anxious',icon:'🌀',title:'불안할 땐',sub:'두려움·걱정·미래가 막막할 때',books:[
    {book:'명상록',author:'마르쿠스 아우렐리우스',ico:'🏛',cat:'불안할 땐',ctx:'황제이자 스토아 철학자였던 아우렐리우스가 전쟁터에서 스스로를 다독이며 쓴 일기. 불안의 대부분은 아직 오지 않은 미래에 대한 것이다.',kw:['현재','스토아','명상','자기절제'],passages:['네가 잠에서 깨어나기 어렵다고 느낄 때 이렇게 생각하라. 나는 인간으로서 해야 할 일을 하기 위해 일어나는 것이다.','현재 이 순간에 집중하라. 과거는 이미 없고, 미래는 아직 없다.','당신이 통제할 수 없는 것에 시간을 낭비하지 마라. 오직 자신의 반응만이 당신의 것이다.','얼마나 많은 것들이 당신의 동의 없이는 당신을 해칠 수 없는가.','외부 것들은 마음을 건드리지 않는다. 괴로움은 오직 내면에서 온다.','우리가 바꿀 수 없는 것을 받아들이고, 바꿀 수 있는 것을 바꾸는 용기를 가져라.','사람들이 무엇을 말하고 행동하는지에 대해 분노하지 마라. 그들도 최선을 다하고 있다.','삶의 장애물은 행동을 막는 것이 아니다. 오히려 행동을 위한 것이다.','아침마다 스스로에게 말하라. 오늘 나는 어려운 사람들을 만날 것이다. 그러나 나는 흔들리지 않을 것이다.','당신이 지금 이 순간에 집중하는 것, 그것이 이미 철학이다.']},
    {book:'엥케이리디온',author:'에픽테토스',ico:'⊕',cat:'불안할 땐',ctx:'노예 출신 철학자 에픽테토스의 핵심 가르침. 불안의 뿌리는 통제할 수 없는 것을 통제하려는 집착에 있다.',kw:['통제','판단','자유','스토아'],passages:['인간을 불안하게 만드는 것은 사건 자체가 아니라, 그 사건에 대한 우리의 판단이다.','우리에게 달린 것과 달리지 않은 것을 구별하라. 그것이 철학의 시작이다.','자유를 원하는가? 그렇다면 통제할 수 없는 것들에 대한 욕망을 버려라.','병은 몸의 장애물이지, 의지의 장애물이 아니다.','즐거움을 약속하는 것 앞에서 스스로를 경계하라. 즐거움은 종종 함정을 숨기고 있다.','남을 비난하는 자는 교육을 시작한 것이다. 아무도 비난하지 않는 자는 교육을 마친 것이다.','요구하는 것들이 일어나도록 노력하지 말고, 일어나는 것들을 원하라. 그러면 평온할 것이다.','작은 것에서 시작하라. 기름이 엎질러졌을 때, 이렇게 말하라. 이것이 평정심을 사는 대가다.','절대로 내가 뭔가를 잃었다고 말하지 마라. 내가 그것을 돌려보냈다고 말하라.','지금 이 순간, 나에게 주어진 것들에 집중하라. 그것으로 충분하다.']},
    {book:'불안의 개념',author:'키르케고르',ico:'🌿',cat:'불안할 땐',ctx:'키르케고르는 불안을 병으로 보지 않았다. 선택할 수 있다는 자유 자체가 불안을 낳는다. 불안은 살아있다는 신호다.',kw:['자유','선택','실존','가능성'],passages:['불안은 자유의 현기증이다. 선택 앞에서 인간은 무한한 가능성과 마주한다.','절망하는 것은 자기 자신이 되지 않으려는 것이다. 자신이 되는 것, 그것이 희망이다.','가장 흔한 절망은 자신이 절망하고 있다는 것조차 모르는 것이다.','삶은 앞을 향해 살아지지만, 뒤를 향해 이해된다.','가능성이 가장 무거운 짐이다. 그러나 가능성 없는 삶은 더 가볍지 않다.','신앙이란 이성이 멈추는 곳에서 시작하는 도약이다.','진정한 자아는 선택의 순간에 드러난다. 당신이 무엇을 선택하느냐가 당신이 누구인지를 말해준다.','고독은 외로움이 아니다. 고독은 자신과 함께하는 능력이다.','불안을 피하려 하지 마라. 불안을 통과할 때 인간은 성장한다.','각자는 자신의 실존을 스스로 감당해야 한다. 누구도 대신해줄 수 없다.']},
    {book:'도덕경',author:'노자',ico:'☁',cat:'불안할 땐',ctx:'노자는 불안의 원인을 과도한 욕심과 통제 욕구에서 찾았다. 덜어내고 낮아질수록 오히려 단단해진다는 역설이다.',kw:['무위','도','덜어냄','유연함'],passages:['위학일익 위도일손(爲學日益 爲道日損). 배움은 더하는 것이고, 도는 덜어내는 것이다.','물처럼 낮은 곳에 처하라. 다투지 않으니 허물이 없다.','지족자부(知足者富). 만족할 줄 아는 자가 부자다.','강한 것은 부러지고, 부드러운 것은 살아남는다. 물이 바위를 이긴다.','말이 많으면 자주 막힌다. 마음속을 지키는 것이 낫다.','억지로 하지 않음으로써 하지 않음이 없게 된다. 무위이무불위(無爲而無不爲).','최고의 선은 물과 같다. 모든 것을 이롭게 하지만 다투지 않는다.','지인자지(知人者智) 자지자명(自知者明). 남을 아는 것은 지혜, 자신을 아는 것은 밝음이다.','빈 그릇이 가장 쓸모 있다. 마음도 비워야 담을 수 있다.','돌아가는 것이 도의 움직임이다. 부드러운 것이 도의 쓰임이다.']},
    {book:'화엄경 강의',author:'틱낫한',ico:'🪷',cat:'불안할 땐',ctx:'베트남 선승 틱낫한의 마음챙김 가르침. 불안은 항상 지금이 아닌 시간대에 산다. 한 번의 깊은 호흡으로 지금으로 돌아올 수 있다.',kw:['마음챙김','현재','호흡','평화'],passages:['지금 이 순간, 이미 충분하다. 미래는 아직 오지 않았고 과거는 이미 지나갔다.','호흡 하나가 기적이다. 발이 땅에 닿는 이 감각이 기적이다.','과거는 이미 지나갔다. 미래는 아직 오지 않았다. 삶은 오직 현재 이 순간에만 있다.','설거지를 할 때는 설거지만 하라. 그것이 명상이다.','미소 짓는 것은 입만이 아니다. 몸 전체로, 존재 전체로 미소 지을 수 있다.','분노는 집 안의 불이다. 먼저 불을 꺼야 한다. 범인을 쫓는 것은 그 다음이다.','깊이 듣는 것은 사랑의 행위다. 상대가 말하는 동안 다음 말을 준비하지 마라.','걸을 때마다 꽃이 핀다고 상상하라. 당신의 발걸음 하나하나가 지구에 드리는 키스다.','두려움은 미래에서 온다. 지금으로 돌아오면 두려움은 사라진다.','우리가 서로를 이해한다면, 우리는 서로를 사랑할 수밖에 없다.']}
  ]},
  {id:'lost',icon:'🧭',title:'길을 잃었을 땐',sub:'방향·정체성·선택의 기로에서',books:[
    {book:'소크라테스의 변론',author:'플라톤 저',ico:'⚗',cat:'길을 잃었을 땐',ctx:'사형 선고를 받은 소크라테스의 마지막 변론. 불편한 질문이야말로 방향을 찾는 첫걸음이다.',kw:['자기인식','진리','용기','질문'],passages:['검토되지 않은 삶은 살 가치가 없다.','나는 내가 모른다는 것을 안다. 그것이 내 지혜의 전부다.','내가 두려워하는 것은 오직 하나, 불의를 저지르는 것이다.','좋은 사람에게는 산 자 중에서도 죽은 자 중에서도 해로운 것이 없다.','질문하는 삶을 살아라. 대답보다 질문이 더 중요하다.','덕은 지식이다. 나쁜 일을 하는 사람은 몰라서 하는 것이다.','나는 신탁의 명령에 따라 지혜로운 척하는 사람들을 논박하는 일을 계속할 것이다.','아무도 자발적으로 나쁜 것을 선택하지 않는다. 잘못은 무지에서 온다.','나를 설득하라. 힘으로는 당신이 이기지만, 이성으로는 내가 이기리라.','죽음을 두려워하는 것은 지혜롭지 못한 것이다. 그것은 모르면서 아는 척하는 것이다.']},
    {book:'장자',author:'장자',ico:'🦋',cat:'길을 잃었을 땐',ctx:'장자의 호접몽. 나는 고정된 존재가 아니라 끊임없이 변화하는 흐름 속에 있다.',kw:['정체성','변화','꿈','자유'],passages:['장주가 꿈에 나비가 되었다. 나비가 꿈에 장주가 된 것인지 알 수 없다. 그것이 물화(物化)다.','지식이 작은 것은 지식이 큰 것에 미치지 못한다. 짧은 해가 긴 해에 미치지 못하듯이.','천하에 가을털 끝보다 큰 것은 없고, 태산은 작다.','삶이 있으면 죽음이 있고, 죽음이 있으면 삶이 있다. 그것은 하나다.','큰 지혜는 한가롭고, 작은 지혜는 분주하다.','진인(眞人)은 삶을 기뻐하지도, 죽음을 거부하지도 않는다.','물고기를 잡으면 통발을 잊고, 뜻을 얻으면 말을 잊어라.','도는 행하면 이루어지고, 사물은 부르면 그렇게 된다.','자연을 따르는 것이 도다. 억지로 하면 모두 어긋난다.','성인은 세상을 다스리지 않는다. 세상 스스로 다스리도록 둔다.']},
    {book:'인간의 조건',author:'한나 아렌트',ico:'✧',cat:'길을 잃었을 땐',ctx:'아렌트는 인간의 본질을 행위와 말하기에서 찾았다. 작은 행동으로 세계에 자신을 드러내는 것이 새 출발이 된다.',kw:['행위','탄생성','공론장','시작'],passages:['행위란 인간이 서로의 존재를 드러내는 유일한 방법이다.','새로운 시작을 만드는 능력, 탄생성, 그것이 인간의 본질이다.','생각하지 않는 것이 악을 만든다. 그것이 악의 평범성이다.','인간은 조건 지어지는 존재다. 그가 접촉하는 모든 것이 즉시 그의 조건이 된다.','공적 영역에서 보이고 들린다는 것은 최고의 의미에서 실재한다는 것이다.','용서는 돌이킬 수 없는 행위의 결과를 취소한다. 약속은 미래의 불확실성을 제거한다.','노동은 삶 자체의 생물학적 과정에 상응하는 인간 활동이다.','가장 급진적인 혁명 행위는 단순히 새로운 아이디어를 생각하는 것이다.','권력은 인간이 함께 행동할 때 생겨난다. 그것은 개인에게 속하지 않는다.','이야기는 행위의 의미를 드러낸다. 우리는 이야기 속에서 자신이 누구인지 발견한다.']},
    {book:'제2의 성',author:'보부아르',ico:'◇',cat:'길을 잃었을 땐',ctx:'보부아르는 실존주의를 삶에 적용했다. 나만의 지도를 그리는 것이 바로 지금부터다.',kw:['선택','자유','실존','기획'],passages:['선택하지 않는 것도 하나의 선택이다. 스스로 삶을 기획하지 않으면, 그 기획은 타인에 의해 이루어진다.','여성으로 태어나는 것이 아니라, 여성이 되는 것이다. 모든 정체성은 만들어진다.','자유는 주어지는 것이 아니라 획득하는 것이다.','우리는 자신이 선택한 것에 책임을 져야 한다. 그것이 실존의 무게다.','사랑은 상대를 소유하는 것이 아니다. 상대가 자유롭도록 원하는 것이다.','진정한 자유는 타인의 자유를 통해서만 가능하다.','행복은 아무것도 원하지 않는 것이 아니라, 원하는 것을 위해 싸우는 것이다.','모든 억압은 정당화된다는 환상에 기댄다. 그 환상을 깨는 것이 해방이다.','타인의 눈을 통해 자신을 보는 것을 멈춰라. 당신이 누구인지는 당신이 결정한다.','삶은 기다리는 자에게 오지 않는다. 삶은 찾아나서는 자에게 온다.']},
    {book:'전습록',author:'왕양명',ico:'🌄',cat:'길을 잃었을 땐',ctx:'왕양명의 지행합일(知行合一). 작은 행동이 곧 앎이고, 그 행동 속에서 방향이 만들어진다.',kw:['지행합일','행동','양지','마음'],passages:['알고도 행하지 않는 것은 아직 알지 못한 것이다. 앎과 행함은 하나다.','양지(良知)는 배우지 않아도 아는 것이다. 마음 깊은 곳의 도덕 감각이다.','마음 밖에 이치가 없고, 마음 밖에 일이 없다.','성인의 학문은 마음 하나를 구하는 것뿐이다.','이치는 마음 안에 있다. 밖에서 구하는 것은 모두 헛수고다.','일상의 작은 일에서도 성찰하라. 거창한 깨달음은 없다.','격물(格物)이란 사물에 있는 이치를 탐구하는 것이 아니라 마음의 정념을 바로잡는 것이다.','자신의 마음을 속이지 마라. 그것이 모든 학문의 출발점이다.','내 마음이 곧 우주다. 우주가 내 마음이다.','행동하지 않는 지식은 지식이 아니다. 오늘 당장 한 걸음을 내딛어라.']}
  ]},
  {id:'angry',icon:'🔥',title:'분노할 땐',sub:'부당함·좌절·억울함을 느낄 때',books:[
    {book:'에티카',author:'스피노자',ico:'🔬',cat:'분노할 땐',ctx:'스피노자는 감정을 억압하지 않고 이해할 것을 권했다. 분노의 원인을 들여다볼 때 그것은 더 이상 우리를 지배하지 못한다.',kw:['감정','이성','이해','자유'],passages:['분노는 우리가 미워하는 자에게 해악을 끼치려는 욕망과 결합된 증오다. 이해하는 자는 분노하지 않는다.','자유로운 인간은 죽음에 대해 가장 적게 생각한다. 그의 지혜는 삶의 묵상이다.','증오는 증오로 극복될 수 없다. 사랑으로만 극복된다.','감정은 그것을 이해할 때 더 이상 수동적 감정이 아니다.','모든 것은 신 안에 있다. 그것이 자연이고, 그것이 필연이다.','덕은 자기 자신을 보존하려는 능력이다. 가장 큰 덕은 자신을 이해하는 것이다.','두려움은 희망 없이는 없고, 희망은 두려움 없이는 없다.','욕망은 인간의 본질이다. 그것을 이해하면 지혜로워진다.','사물을 영원의 관점에서 보라. 그러면 모든 분노가 작아진다.','행복은 덕의 결과가 아니다. 행복 자체가 덕이다.']},
    {book:'화에 대하여',author:'세네카',ico:'🏺',cat:'분노할 땐',ctx:'세네카는 분노를 다루는 구체적 처방을 제시했다. 대부분의 분노는 48시간 뒤 그 크기가 절반 이하로 줄어든다.',kw:['절제','기다림','스토아','후회'],passages:['분노는 잠시 미친 상태다. 먼저 자신을 통제하라. 기다려라. 분노는 스스로 사그라든다.','화가 났을 때 말하지 마라. 그 말들은 나중에 반드시 후회하게 될 것이다.','분노는 단 한 번도 우리를 도운 적이 없다.','현명한 자는 화낼 이유가 있을 때 화내지 않는다. 그는 더 나은 것을 추구한다.','상처를 준 자에게 복수하는 가장 좋은 방법은 그처럼 되지 않는 것이다.','우리를 화나게 하는 것은 사건이 아니라 그 사건에 대한 우리의 판단이다.','시간을 낭비하는 자들이 그것을 가장 아쉬워한다.','용감한 자는 필요할 때 두려워하고, 어리석은 자는 필요 없을 때 두려워한다.','인생은 짧다. 화내는 데 시간을 낭비하기에는 너무 짧다.','타인의 잘못을 관대하게 봐라. 당신도 많은 잘못을 하고 있다.']},
    {book:'맹자',author:'맹자',ico:'🌾',cat:'분노할 땐',ctx:'맹자는 분노를 나쁜 것으로 보지 않았다. 부당함에 분노하는 마음은 인간의 선한 본성에서 온다.',kw:['인의','측은지심','성선설','정의'],passages:['사람이 차마 하지 못하는 마음이 있으니, 이것이 인(仁)의 단서다.','측은지심(惻隱之心)은 인의 단서, 수오지심(羞惡之心)은 의의 단서다.','하늘이 장차 큰 임무를 내리려 할 때는 반드시 먼저 그 마음을 고통스럽게 한다.','백성이 가장 귀하고, 사직이 다음이며, 군주는 가장 가볍다.','인(仁)은 사람의 마음이요, 의(義)는 사람의 길이다.','자포자기(自暴自棄)하는 자와는 함께 선을 행할 수 없다.','남이 나를 사랑하지 않으면 내 인(仁)을 반성하라.','뜻이 있는 선비는 도랑과 구덩이에 버려질 각오를 하고, 용감한 선비는 목을 잃을 각오를 한다.','무릇 뜻이 기(氣)의 장수다. 뜻이 있는 곳에 기가 모인다.','사람이 차마 못하는 것을 차마 하는 것들에까지 미치면 인이 된다.']},
    {book:'나에게는 꿈이 있습니다',author:'마르틴 루터 킹',ico:'✊',cat:'분노할 땐',ctx:'킹 목사는 분노를 사랑으로 정제하는 법을 실천으로 보여줬다. 정당한 분노는 세상을 바꾸는 연료가 될 수 있다.',kw:['비폭력','사랑','정의','저항'],passages:['어둠으로는 어둠을 몰아낼 수 없다. 오직 빛만이 그것을 할 수 있다.','부정의한 법에 복종하는 것은 자신을 비하하는 것이다.','우리는 원수를 사랑해야 한다. 그것이 더 강하기 때문이다.','자유를 위한 투쟁에서 비폭력은 전술이 아니라 삶의 방식이다.','불의 어디서든 정의에 대한 위협이다.','지금 당장 행동하지 않으면 나중은 없다.','진정한 평화는 긴장의 부재가 아니라 정의의 존재다.','인간의 가치는 그가 어디에 있느냐가 아니라 무엇을 향해 가느냐에 있다.','우리는 함께 형제로 살 것인가, 아니면 함께 바보로 멸망할 것인가.','꿈을 포기하지 마라. 오늘의 고통은 내일의 빛을 위한 것이다.']},
    {book:'논어',author:'공자',ico:'📜',cat:'분노할 땐',ctx:'공자는 분노 자체를 금하지 않았다. 다만 그 표현이 예(禮)를 지켜야 한다고 했다.',kw:['화이부동','예','군자','조화'],passages:['군자는 화이부동(和而不同)하고, 소인은 동이불화(同而不和)한다.','기소불욕 물시어인(己所不欲 勿施於人). 자신이 원하지 않는 것을 남에게 베풀지 마라.','군자는 말이 행동보다 앞서는 것을 부끄러워한다.','잘못하고도 고치지 않는 것, 그것이 진짜 잘못이다.','아는 것을 안다고 하고, 모르는 것을 모른다고 하는 것이 앎이다.','배우고 생각하지 않으면 헛되고, 생각하고 배우지 않으면 위태롭다.','세 사람이 걸어가면 반드시 나의 스승이 있다.','군자는 의(義)에 밝고 소인은 이(利)에 밝다.','참을 인(忍) 자 셋이면 살인도 면한다.','자신을 이기고 예로 돌아가는 것이 인(仁)이다.']}
  ]},
  {id:'love',icon:'💫',title:'사랑할 땐',sub:'관계·그리움·연결을 느낄 때',books:[
    {book:'향연',author:'플라톤',ico:'🏺',cat:'사랑할 땐',ctx:'플라톤의 향연에서 사랑은 아름다움 자체를 향한 상승 운동이다. 사랑이 우리를 성장시키는 이유다.',kw:['에로스','이데아','향연','상승'],passages:['사랑은 불멸을 향한 욕망이다. 에로스의 사다리는 아름다운 육체에서 아름다움 자체로 오른다.','사랑하는 자는 사랑받는 자보다 더 신성하다. 신이 그 안에 있기 때문이다.','반쪽을 찾는 것이 사랑이 아니다. 완전한 선을 향한 욕망이 사랑이다.','진정한 사랑은 아름다운 몸이 아니라 아름다운 영혼을 향한다.','사랑은 철학의 어머니다. 지혜를 사랑하는 것이 철학이기 때문이다.','사랑하는 자는 자신의 결핍을 안다. 그래서 사랑은 신과 인간 사이에 있다.','아름다움은 진리의 빛남이다. 사랑은 그 빛을 향한 눈이다.','최고의 사랑은 영혼이 덕으로 임신하도록 돕는 것이다.','사랑은 주는 것이지 받는 것이 아니다. 그러나 주는 자가 더 풍요로워진다.','진정으로 사랑하는 자는 사랑하는 이와 함께 아름다움 자체를 바라본다.']},
    {book:'사랑의 기술',author:'에리히 프롬',ico:'♡',cat:'사랑할 땐',ctx:'프롬은 사랑을 수동적 감정이 아닌 능동적 실천으로 봤다. 사랑은 기술이고, 기술은 늘 가르칠 수 있다.',kw:['기예','능동성','성숙','관계'],passages:['사랑은 감정이 아니다. 사랑은 기예다. 배워야 하고 연습해야 한다.','성숙한 사랑은 말한다. 나는 당신이 필요하기 때문에 당신을 사랑한다.','사랑은 결합이지만, 각자의 개성을 보존하는 결합이다.','자기 자신을 사랑하는 것은 이기심이 아니다. 그것은 타인을 사랑하는 능력의 전제조건이다.','사랑은 두 존재의 활발한 힘이다. 장벽을 허물고 서로를 가깝게 하는 힘.','우리는 사랑에 빠지는 것과 사랑 안에 머무는 것을 혼동한다.','사랑은 관심, 책임, 존중, 그리고 앎이다. 이 넷이 없으면 사랑이 아니다.','자유는 사랑의 조건이다. 소유는 사랑을 파괴한다.','타인을 사랑하는 것은 능동적 행위다. 결코 수동적 감정이 아니다.','우리 시대의 문제는 자신이 사랑받을 가치가 있다고 믿지 않는 것이다.']},
    {book:'마스나비',author:'루미',ico:'🌹',cat:'사랑할 땐',ctx:'루미에게 그리움은 슬픔이 아니라 신성한 연결의 신호다. 그리운 마음이 클수록 그 사랑이 깊다는 증거다.',kw:['그리움','분리','신비주의','연결'],passages:['갈대는 갈대밭에서 잘려나온 뒤로 울고 있다. 그 그리움의 소리를 들어라.','사랑이란 그 분리의 아픔 속에서만 드러나는 것이다.','나는 내가 찾고 있는 것이었다. 바깥에서 찾지 말라.','침묵은 사랑의 언어다. 말로 할 수 없는 것이 더 많다.','당신 안에 바다가 있는데 왜 우물에서 물을 마시는가.','과거와 미래가 당신의 눈을 가린다. 지금 이 순간에 불꽃이 있다.','사랑은 길이자 그 길을 안내하는 빛이다.','영혼은 몸 안에 있지 않다. 몸이 영혼 안에 있다.','당신이 찾는 것이 당신을 찾고 있다.','모든 인간은 자신의 상상에 따라 나의 친구이지만, 내 비밀을 아는 이는 없다.']},
    {book:'중력과 은총',author:'시몬 베유',ico:'✦',cat:'사랑할 땐',ctx:'베유의 주의(attention) 개념. 상대를 있는 그대로 바라보는 순간, 사랑은 집착에서 자유로 바뀐다.',kw:['주의','존재','자유','타자'],passages:['사랑한다는 것은 상대에게 "당신이 존재해서 기쁩니다"라고 말하는 것이다.','진정한 사랑은 상대가 있는 그대로 존재하도록 공간을 내어주는 것이다.','주의(attention)는 사랑의 가장 희귀하고 순수한 형태다.','아름다움은 중력에 맞서는 은총이다. 사랑도 그러하다.','고통받는 자에게 묻는 것: 당신은 무엇을 겪고 있습니까? 그것이 사랑이다.','내가 없어짐으로써 신이 들어올 수 있다. 진정한 사랑은 자아를 비우는 것이다.','불행은 영혼을 파괴하거나 변화시킨다. 사랑은 불행 속에서도 영혼을 지킨다.','기다리는 것도 사랑의 행위다. 상대가 준비될 때까지 기다리는 것.','고통에 동의하는 것은 굴복이 아니다. 그것은 현실을 사랑하는 것이다.','완벽한 주의는 곧 기도다. 그리고 기도는 사랑의 다른 이름이다.']},
    {book:'장자',author:'장자',ico:'🦋',cat:'사랑할 땐',ctx:'장자에게 사랑은 집착이 없는 연결이다. 자연의 흐름처럼 오고 가게 둘 때 관계는 오히려 자유로워진다.',kw:['집착','자유','흐름','도'],passages:['장자의 아내가 죽자 장자는 노래를 불렀다. 기운이 모여 태어나고, 흩어져 자연으로 돌아간 것이오.','진정한 우정은 서로를 잊는 것이다. 물고기는 물 안에서 서로를 잊는다.','집착하지 않는 사랑이 가장 깊은 사랑이다.','강과 바다가 낮은 곳에 있기에 모든 물이 모인다. 사랑도 그러하다.','이별을 슬퍼하지 마라. 만남과 헤어짐은 자연의 리듬이다.','진인(眞人)의 사랑은 집착 없이 깊다. 달처럼 멀리서도 빛난다.','나비처럼 가볍게 사랑하라. 집착은 날개를 무겁게 한다.','사랑하는 자를 가두지 마라. 새장 안의 새는 더 이상 새가 아니다.','흐르는 물처럼 사랑하라. 막으면 썩고, 흐르면 맑아진다.','잃는 것을 두려워하면 이미 잃은 것이다. 내려놓을 때 비로소 얻는다.']}
  ]},
  {id:'meaning',icon:'✨',title:'의미를 찾을 땐',sub:'삶의 목적·성장·깨달음을 원할 때',books:[
    {book:'니코마코스 윤리학',author:'아리스토텔레스',ico:'🏛',cat:'의미를 찾을 땐',ctx:'아리스토텔레스의 에우다이모니아. 의미는 찾는 것이 아니라 만드는 것이다.',kw:['에우다이모니아','탁월성','활동','덕'],passages:['행복은 영혼의 덕에 따른 활동이다. 행복은 상태가 아니라 활동이다.','탁월함을 발휘하며 살아갈 때, 인간은 비로소 목적에 맞게 살고 있는 것이다.','덕은 습관의 결과다. 우리는 반복함으로써 덕스러운 사람이 된다.','중용(中庸)이 덕이다. 너무 많지도, 너무 적지도 않은 것.','친구는 또 다른 자아다. 진정한 우정은 상대의 덕을 위한 것이다.','관조하는 삶이 가장 행복한 삶이다. 신적인 것에 가장 가깝기 때문이다.','인간은 본성적으로 사회적 동물이다. 혼자인 자는 신이거나 짐승이다.','진정한 부는 욕망을 충족시키는 것이 아니라 욕망을 줄이는 것이다.','용기는 두려움이 없는 것이 아니라, 두려움에도 행동하는 것이다.','좋은 사람은 자신에게 가장 좋은 친구다. 자신을 사랑하라.']},
    {book:'실천이성비판',author:'임마누엘 칸트',ico:'⚖',cat:'의미를 찾을 땐',ctx:'칸트 결론부. 의미는 거창한 곳에 있지 않다. 밤하늘과 내 안의 도덕 법칙, 그 두 가지가 삶의 의미를 만든다.',kw:['도덕법칙','경이','이성','존엄'],passages:['두 가지가 내 마음을 경이로 채운다. 내 위의 별이 빛나는 하늘과, 내 안의 도덕 법칙.','네 행동의 원칙이 보편적 법칙이 될 수 있도록 행동하라.','인간을 수단으로만 대하지 말고, 항상 목적으로도 대하라.','계몽이란 스스로 자초한 미성숙에서 벗어나는 것이다. 과감히 알려고 하라!','도덕 법칙은 외부에서 오지 않는다. 이성 안에 있다.','자유는 도덕의 조건이다. 강요에 의한 선행은 선행이 아니다.','아름다운 것은 목적 없는 합목적성이다.','거짓말은 어떤 상황에서도 허용되지 않는다. 그것이 의무의 엄격함이다.','영원한 평화는 가능하다. 그것은 인류의 의무다.','인간의 존엄은 자율에 있다. 스스로 법칙을 세우고 그것에 따르는 것이다.']},
    {book:'수상록',author:'몽테뉴',ico:'📖',cat:'의미를 찾을 땐',ctx:'몽테뉴는 자기 자신을 탐구하는 것이 철학의 시작이라 했다. 오늘 하루 나 자신을 정직하게 관찰하는 것이 의미 탐구의 전부다.',kw:['자기탐구','일상','성찰','인간'],passages:['나는 가장 평범한 일상의 철학자다. 내 연구 주제는 나 자신이다.','가장 위대한 일은 자기 자신의 주인이 되는 것이다.','내가 어떻게 사는가가 내가 무엇을 믿는가보다 더 중요하다.','모든 인간은 인류의 전체 조건을 그 안에 담고 있다.','현명한 자는 자신의 나라를 가진다. 그것은 온 우주다.','나는 다른 사람보다 나 자신을 더 잘 묘사한다.','철학한다는 것은 죽는 법을 배우는 것이다.','확신하는 것이 많을수록 지식이 적다.','독서는 인류와의 대화다. 가장 광범위하고 자유로운 대화.','삶의 가치는 길이에 있지 않고, 사용에 있다.']},
    {book:'법구경',author:'석가모니',ico:'☸',cat:'의미를 찾을 땐',ctx:'불교 경전 법구경의 핵심. 의미는 외부에서 오지 않는다. 마음을 다스리는 것이 의미 있는 삶의 출발점이다.',kw:['마음','깨달음','업','행복'],passages:['마음이 모든 것에 앞선다. 깨끗한 마음으로 행동하면 행복이 그림자처럼 따른다.','원한은 원한으로 풀리지 않는다. 오직 사랑으로만 풀린다.','천 개의 의미 없는 말보다 듣고 마음이 고요해지는 한 마디가 낫다.','최고의 승리는 자기 자신을 이기는 것이다.','모든 것은 변한다. 그것을 깨달을 때 고통이 줄어든다.','욕망 때문에 슬픔이 생긴다. 욕망에서 벗어나면 슬픔도 없다.','좋은 친구, 좋은 동반자, 좋은 스승을 갖는 것이 고귀한 삶의 전부다.','어리석은 자는 평생 현자 곁에 있어도 진리를 모른다. 현자는 잠깐이라도 진리를 본다.','분노를 내려놓아라. 자만을 버려라. 모든 속박에서 벗어나라.','지금 이 순간 깨어있는 것이 곧 깨달음이다.']},
    {book:'논어',author:'공자',ico:'📜',cat:'의미를 찾을 땐',ctx:'공자의 자기 서사. 의미 있는 삶은 한 번에 완성되지 않는다. 지금 내 나이에 맞는 과업이 곧 의미다.',kw:['성장','수양','자기서사','군자'],passages:['나는 열다섯에 배움에 뜻을 두었고, 서른에 자립했으며, 마흔에 흔들리지 않았다.','배우고 때로 익히면 또한 기쁘지 아니한가.','아는 자는 좋아하는 자만 못하고, 좋아하는 자는 즐기는 자만 못하다.','군자는 의(義)에 밝고 소인은 이(利)에 밝다.','하루에 세 번 자신을 돌아본다. 충실했는가, 진실했는가, 익혔는가.','멀리서 친구가 찾아오니 또한 즐겁지 아니한가.','먼저 행하고 그 다음에 말하라.','옛것을 익히고 새것을 알면 스승이 될 수 있다.','군자는 두루 어울리되 편당하지 않고, 소인은 편당하되 두루 어울리지 않는다.','도(道)가 행해지지 않는 것을 나는 안다. 아는 자는 지나치고, 어리석은 자는 못 미친다.']}
  ]}
];

const allP=cats.flatMap(c=>c.books.flatMap(b=>b.passages.map(p=>({p,book:b.book,author:b.author,ico:b.ico,cat:b.cat,ctx:b.ctx,kw:b.kw}))));
let cur=0,saved=false;

function getDate(){const d=new Date();return d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일'}

function render(item){
  document.getElementById('today-date').textContent=getDate();
  document.getElementById('today-cat').textContent=item.cat;
  document.getElementById('today-ico').textContent=item.ico;
  document.getElementById('today-book').textContent='《'+item.book+'》';
  document.getElementById('today-author').textContent=item.author;
  document.getElementById('today-passage').textContent=item.p;
  document.getElementById('today-ctx').textContent=item.ctx;
  document.getElementById('today-kw').innerHTML=item.kw.map(k=>`<span class="kw">#${k}</span>`).join('');
  saved=false;
  document.getElementById('save-btn').classList.remove('saved');
  document.getElementById('save-lbl').textContent='저장하기';
  const c=document.getElementById('passage-card');
  c.classList.remove('fade');void c.offsetWidth;c.classList.add('fade');
}

function shufflePassage(){
  let n=(cur+1+Math.floor(Math.random()*(allP.length-1)))%allP.length;
  cur=n;render(allP[cur]);
  document.querySelector('.scroll-area').scrollTop=0;
}

function toggleSave(){
  saved=!saved;
  document.getElementById('save-btn').classList.toggle('saved',saved);
  document.getElementById('save-lbl').textContent=saved?'저장됨 ✓':'저장하기';
}

function deepDive(){
  const item=allP[cur];
  alert('📖 《'+item.book+'》— '+item.author+'\n\n'+item.ctx+'\n\n키워드: '+item.kw.map(k=>'#'+k).join(' '));
}

function renderCats(){
  document.getElementById('cgrid').innerHTML=cats.map(c=>`
    <div class="ccard" onclick="openCat('${c.id}')">
      <div class="chdr">
        <div class="cleft">
          <div class="cicon">${c.icon}</div>
          <div><div class="ctitle">${c.title}</div><div class="csub">${c.sub}</div></div>
        </div>
        <div class="carr">›</div>
      </div>
      <div class="cpills">${c.books.map(b=>`<span class="cpill">《${b.book}》</span>`).join('')}</div>
    </div>`).join('');
}

function openCat(id){
  const c=cats.find(x=>x.id===id);
  document.getElementById('scr-main').classList.remove('active');
  document.getElementById('scr-detail').classList.add('active');
  document.querySelector('.scroll-area').scrollTop=0;
  document.getElementById('dhdr').innerHTML=`<div class="dico">${c.icon}</div><div><div class="dtitle">${c.title}</div><div class="dsub">${c.sub} · 책 ${c.books.length}권 · 문구 ${c.books.length*10}개</div></div>`;
  document.getElementById('plist').innerHTML=c.books.map(b=>`
    <div class="bcard">
      <div class="btop">
        <div class="bico2">${b.ico}</div>
        <div><div class="bname">《${b.book}》</div><div class="bauth">${b.author}</div></div>
      </div>
      <div class="bpassages">
        ${b.passages.map((p,i)=>`
          <div class="bp-item" onclick="selectPassage(${allP.findIndex(x=>x.p===p&&x.book===b.book)})">
            <div class="bp-num">문구 ${i+1}</div>
            <div class="bp-text">${p}</div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function selectPassage(idx){
  if(idx<0)return;
  cur=idx;render(allP[idx]);goBack();
}

function goBack(){
  document.getElementById('scr-detail').classList.remove('active');
  document.getElementById('scr-main').classList.add('active');
  document.querySelector('.scroll-area').scrollTop=0;
}

cur=Math.floor(Math.random()*allP.length);
render(allP[cur]);
renderCats();
</script>
</body>
</html>
