<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F5F3EF">
<title>Philo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Eulyoo1945';
  src: url('./Eulyoo1945-Regular.woff2') format('woff2'),
       url('./Eulyoo1945-Regular.woff') format('woff');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Eulyoo1945';
  src: url('./Eulyoo1945-SemiBold.woff2') format('woff2'),
       url('./Eulyoo1945-SemiBold.woff') format('woff');
  font-weight: 600;
  font-style: normal;
  font-display: swap;
}
:root {
  --paper:#F5F3EF; --paper-2:#EDEAE4; --paper-3:#E2DED7;
  --ink:#1A1814; --ink-2:#3D3A34; --ink-3:#7A766E; --ink-4:#B0AB9F;
  --line:#D8D3CB;
  --ff:'Noto Sans KR',sans-serif; --fs:'Eulyoo1945','Noto Serif KR',serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--paper)}
body{font-family:var(--ff);background:var(--paper);min-height:100vh;display:flex;justify-content:center;padding:0}
@media(min-width:520px){
  body{padding:40px 20px 80px;align-items:flex-start}
  .wrap{width:480px;box-shadow:0 2px 40px rgba(0,0,0,0.08),0 0 0 1px rgba(0,0,0,0.06);border-radius:4px}
}
@media(max-width:519px){.wrap{width:100%;border-radius:0}}
.wrap{background:var(--paper);overflow:hidden;display:flex;flex-direction:column}

/* scroll area */
.scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex:1}
.scroll::-webkit-scrollbar{display:none}
@media(min-width:520px){.scroll{max-height:calc(92vh - 52px)}}
@media(max-width:519px){.scroll{max-height:calc(100svh - 52px)}}

/* screens */
.screen{display:none}
.screen.active{display:block}

/* ── HEADER ── */
.hdr{padding:28px 28px 20px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;justify-content:space-between}
.logo{font-family:var(--fs);font-size:22px;font-weight:500;color:var(--ink);letter-spacing:-0.5px}
.brand-logo{height:36px;width:auto;display:inline-block;vertical-align:middle}
.logo-sub{font-size:12px;color:var(--ink-4);font-weight:300;margin-left:8px;letter-spacing:0.3px}
.hdr-right{font-size:12px;color:var(--ink-3);font-weight:400;letter-spacing:0.2px}

/* ── BODY ── */
.body{padding:0 28px 48px}
.meta-row{padding:20px 0 0;display:flex;align-items:baseline;justify-content:space-between}
.meta-date{font-size:13px;color:var(--ink-4);font-weight:300;letter-spacing:0.3px}
.meta-cat{font-size:12px;color:var(--ink-3);font-weight:400;letter-spacing:0.5px;text-transform:uppercase}
.hr{border:none;border-top:1px solid var(--line);margin:18px 0}
.hr-thin{border:none;border-top:1px solid var(--line);margin:24px 0}

/* source */
.source-block{margin-bottom:18px}
.source-book{font-family:var(--fs);font-size:15px;font-weight:500;color:var(--ink);letter-spacing:-0.2px}
.source-author{font-size:13px;color:var(--ink-3);margin-top:3px;font-weight:300}
.source-ref{font-size:11px;color:var(--ink-4);margin-top:4px;letter-spacing:0.3px;font-style:italic}

/* passage */
.passage{font-family:var(--fs);font-size:18px;font-weight:300;line-height:2.0;color:var(--ink);word-break:keep-all;letter-spacing:-0.1px}

/* commentary */
.commentary-label{font-size:11px;font-weight:500;color:var(--ink-4);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:12px}
.commentary{font-size:15px;line-height:1.95;color:var(--ink-2);word-break:keep-all;font-weight:300}

/* keywords */
.kw-row{display:flex;gap:8px;flex-wrap:wrap}
.kw{font-size:12px;color:var(--ink-3);font-weight:400;letter-spacing:0.3px;cursor:pointer;padding:2px 0;border-bottom:1px solid var(--line);transition:color 0.15s,border-color 0.15s}
.kw:hover,.kw:active{color:var(--ink);border-color:var(--ink-3)}

/* action buttons */
.act-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.abtn{padding:14px 16px;border:1px solid var(--line);background:transparent;font-family:var(--ff);font-size:13px;font-weight:400;color:var(--ink-3);cursor:pointer;letter-spacing:0.2px;transition:all 0.15s;text-align:center}
.abtn:hover,.abtn:active{border-color:var(--ink-3);color:var(--ink)}
.abtn.saved{border-color:var(--ink);color:var(--ink)}

/* shuffle */
.shuffle-btn{width:100%;padding:16px;background:var(--ink);border:none;font-family:var(--fs);font-size:15px;font-weight:400;color:var(--paper);cursor:pointer;letter-spacing:0.3px;transition:opacity 0.15s;text-align:center}
.shuffle-btn:hover{opacity:0.85}
.shuffle-btn:active{opacity:0.75}

/* section header */
.sec-hdr{font-size:11px;font-weight:500;color:var(--ink-4);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px}

/* category list */
.cat-list{display:flex;flex-direction:column}
.ccard{padding:18px 0;border-bottom:1px solid var(--line);cursor:pointer;display:flex;align-items:baseline;justify-content:space-between;gap:12px;transition:opacity 0.12s}
.ccard:first-child{border-top:1px solid var(--line)}
.ccard:hover,.ccard:active{opacity:0.6}
.cat-left{flex:1}
.cat-title{font-family:var(--fs);font-size:17px;font-weight:400;color:var(--ink);letter-spacing:-0.2px;margin-bottom:4px}
.cat-sub{font-size:13px;color:var(--ink-3);font-weight:400;letter-spacing:0.2px}
.cat-books{font-size:12px;color:var(--ink-2);margin-top:8px;font-weight:300;line-height:1.8}
.cat-arr{font-size:18px;color:var(--ink-4);flex-shrink:0;align-self:center}

/* ── DETAIL ── */
.det-body{padding:0 28px 48px}
.back-row{padding:20px 0;margin-bottom:4px}
.backbtn{background:none;border:none;font-family:var(--ff);font-size:13px;color:var(--ink-3);cursor:pointer;padding:0;letter-spacing:0.2px;transition:color 0.12s;display:flex;align-items:center;gap:6px}
.backbtn:hover,.backbtn:active{color:var(--ink)}
.det-cat-title{font-family:var(--fs);font-size:24px;font-weight:400;color:var(--ink);letter-spacing:-0.5px;margin-bottom:6px}
.det-cat-sub{font-size:13px;color:var(--ink-3);font-weight:300}
.bsec{margin-bottom:36px}
.bsec-title{font-family:var(--fs);font-size:16px;font-weight:500;color:var(--ink);letter-spacing:-0.2px;margin-bottom:2px}
.bsec-author{font-size:12px;color:var(--ink-4);font-weight:300;margin-bottom:14px}
.bp-item{padding:16px 0;border-top:1px solid var(--line);cursor:pointer;transition:opacity 0.12s}
.bp-item:hover,.bp-item:active{opacity:0.55}
.bp-ref{font-size:11px;color:var(--ink-4);letter-spacing:0.4px;margin-bottom:7px;font-style:italic}
.bp-preview{font-family:var(--fs);font-size:15px;font-weight:300;line-height:1.85;color:var(--ink-2);word-break:keep-all;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

/* ── SAVED ── */
.saved-body{padding:0 28px 48px}
.saved-empty{padding:64px 0 40px;text-align:center}
.saved-empty-title{font-family:var(--fs);font-size:17px;font-weight:400;color:var(--ink-3);margin-bottom:10px;letter-spacing:-0.2px}
.saved-empty-sub{font-size:13px;color:var(--ink-4);font-weight:300;line-height:1.75}
.saved-count-lbl{font-size:11px;font-weight:500;color:var(--ink-4);letter-spacing:1.2px;text-transform:uppercase;padding:20px 0 4px}
.saved-list{display:flex;flex-direction:column}
.saved-item{padding:20px 0 20px;border-bottom:1px solid var(--line);cursor:pointer;transition:opacity 0.12s;position:relative;padding-right:28px}
.saved-item:first-child{border-top:1px solid var(--line)}
.saved-item:hover{opacity:0.65}
.saved-item-book{font-size:12px;color:var(--ink-4);font-weight:300;margin-bottom:7px;letter-spacing:0.2px}
.saved-item-passage{font-family:var(--fs);font-size:16px;font-weight:300;line-height:1.85;color:var(--ink);word-break:keep-all;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.saved-item-ref{font-size:11px;color:var(--ink-4);margin-top:10px;font-style:italic}
.del-btn{position:absolute;top:22px;right:0;background:none;border:none;font-size:18px;color:var(--ink-4);cursor:pointer;padding:0;line-height:1;transition:color 0.12s;font-family:var(--ff)}
.del-btn:hover{color:var(--ink)}

/* ── TAB BAR ── */
.tab-bar{background:var(--paper);border-top:1px solid var(--line);display:grid;grid-template-columns:1fr 1fr 1fr;flex-shrink:0}
.tab-item{padding:13px 8px 18px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;background:none;border:none;font-family:var(--ff);transition:opacity 0.12s}
.tab-item:hover{opacity:0.6}
.tab-label{font-size:11px;font-weight:400;color:var(--ink-3);letter-spacing:0.4px}
.tab-item.active-tab .tab-label{color:var(--ink);font-weight:500}
.tab-dot{width:4px;height:4px;border-radius:50%;background:transparent;margin-top:1px}
.tab-item.active-tab .tab-dot{background:var(--ink)}

/* ── TEXT SELECTION ── */
.passage::selection{background:rgba(26,24,20,0.12);color:var(--ink)}
.passage::-moz-selection{background:rgba(26,24,20,0.12);color:var(--ink)}
.commentary::selection{background:rgba(26,24,20,0.10);color:var(--ink-2)}
.commentary::-moz-selection{background:rgba(26,24,20,0.10);color:var(--ink-2)}
.source-book::selection,.source-author::selection,.source-ref::selection{background:rgba(26,24,20,0.10);color:var(--ink)}
.source-book::-moz-selection,.source-author::-moz-selection,.source-ref::-moz-selection{background:rgba(26,24,20,0.10);color:var(--ink)}


/* ── SHARE / RECOMMEND ── */
.share-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.share-toast{position:fixed;left:50%;bottom:74px;transform:translateX(-50%);background:var(--ink);color:var(--paper);font-size:12px;padding:10px 14px;border-radius:999px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:20;white-space:nowrap}
.share-toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
.rec-list{display:flex;flex-direction:column;gap:0}
.rec-item{padding:14px 0;border-top:1px solid var(--line);cursor:pointer;transition:opacity .12s}
.rec-item:hover,.rec-item:active{opacity:.6}
.rec-book{font-size:11px;color:var(--ink-4);font-weight:300;margin-bottom:6px;letter-spacing:.2px}
.rec-passage{font-family:var(--fs);font-size:14px;font-weight:300;line-height:1.75;color:var(--ink-2);word-break:keep-all;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.capture-card{position:fixed;left:-9999px;top:0;width:720px;background:var(--paper);padding:56px 52px;border:1px solid var(--line);font-family:var(--ff);color:var(--ink)}
.capture-logo{font-family:var(--fs);font-size:28px;font-weight:500;margin-bottom:34px}
.capture-book{font-family:var(--fs);font-size:18px;font-weight:500;margin-bottom:6px}
.capture-author{font-size:14px;color:var(--ink-3);margin-bottom:8px}
.capture-ref{font-size:12px;color:var(--ink-4);font-style:italic;margin-bottom:28px}
.capture-passage{font-family:var(--fs);font-size:24px;font-weight:300;line-height:1.9;word-break:keep-all;margin-bottom:30px}
.capture-cat{font-size:13px;color:var(--ink-3);letter-spacing:.4px}

/* ── ANIM ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fade{animation:fadeIn 0.3s ease forwards}
</style>
</head>

const allP = cats.flatMap(c => c.books.flatMap(b => b.passages.map(pa => ({
  ...pa, book: b.book, author: b.author, cat: b.cat
}))));

let cur = 0;
let savedList = loadSavedList(); // { idx, item }
let currentTab = 'home';

const LS_STREAK = 'philo_streak_v1';
const LS_SAVED = 'philo_saved_v1';

function dateKey(d = new Date()) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function daysBetween(a, b) {
  const A = new Date(a + 'T00:00:00');
  const B = new Date(b + 'T00:00:00');
  return Math.round((B - A) / 86400000);
}

function loadSavedList() {
  try {
    const raw = localStorage.getItem('philo_saved_v1');
    const parsed = raw ? JSON.parse(raw) : [];
    return Array.isArray(parsed) ? parsed.filter(s => Number.isInteger(s.idx) && allP[s.idx]).map(s => ({ idx: s.idx, item: allP[s.idx] })) : [];
  } catch (e) {
    return [];
  }
}

function persistSavedList() {
  localStorage.setItem(LS_SAVED, JSON.stringify(savedList.map(s => ({ idx: s.idx }))));
}

function updateStreak() {
  const today = dateKey();
  let data = { lastRead: null, count: 0 };
  try {
    data = JSON.parse(localStorage.getItem(LS_STREAK)) || data;
  } catch (e) {}

  if (data.lastRead !== today) {
    const gap = data.lastRead ? daysBetween(data.lastRead, today) : null;
    data.count = gap === 1 ? (Number(data.count) || 0) + 1 : 1;
    data.lastRead = today;
    localStorage.setItem(LS_STREAK, JSON.stringify(data));
  }

  document.getElementById('streak-count').textContent = `${data.count || 1}일 연속`;
}

function getDate() {
  const d = new Date();
  return d.getFullYear() + '. ' + (d.getMonth()+1) + '. ' + d.getDate() + '.';
}

function render(item) {
  document.getElementById('today-date').textContent = getDate();
  document.getElementById('today-cat').textContent = item.cat;
  document.getElementById('today-book').textContent = '《' + item.book + '》';
  document.getElementById('today-author').textContent = item.author;
  document.getElementById('today-ref').textContent = item.ref;
  document.getElementById('today-passage').textContent = item.p;
  document.getElementById('today-ctx').textContent = item.ctx;
  document.getElementById('today-kw').innerHTML = item.kw.map(k => `<span class="kw">${k}</span>`).join('');
  renderRecommendations(item);
  syncSaveBtn();
  ['source-block','today-passage'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('fade'); void el.offsetWidth; el.classList.add('fade');
  });
}

function syncSaveBtn() {
  const isSaved = savedList.some(s => s.idx === cur);
  document.getElementById('save-btn').classList.toggle('saved', isSaved);
  document.getElementById('save-lbl').textContent = isSaved ? '저장됨' : '저장하기';
}

function shufflePassage() {
  let n = (cur + 1 + Math.floor(Math.random() * (allP.length - 1))) % allP.length;
  cur = n;
  render(allP[cur]);
  document.querySelector('.scroll').scrollTop = 0;
}

function toggleSave() {
  const idx = savedList.findIndex(s => s.idx === cur);
  if (idx >= 0) {
    savedList.splice(idx, 1);
  } else {
    savedList.unshift({ idx: cur, item: allP[cur] });
  }
  persistSavedList();
  syncSaveBtn();
  updateSavedLabel();
}

function updateSavedLabel() {
  const n = savedList.length;
  document.getElementById('tab-saved-lbl').textContent = n > 0 ? '저장함 ' + n : '저장함';
  document.getElementById('saved-hdr-count').textContent = n > 0 ? n + '편' : '';
}

function deepDive() {
  const item = allP[cur];
  if (typeof sendPrompt === 'function') {
    sendPrompt('《' + item.book + '》 ' + item.ref + '\n\n"' + item.p.slice(0,60) + '..."\n\n이 문구의 철학적 배경과 현대적 의미를 더 깊이 설명해줘 ↗');
  }
}


function renderRecommendations(item) {
  const pool = allP
    .map((p, idx) => ({ ...p, idx }))
    .filter(p => p.cat === item.cat && p.idx !== cur);
  const recs = pool.slice(0, 3);
  const el = document.getElementById('rec-list');
  if (!el) return;
  el.innerHTML = recs.map(r => `
    <div class="rec-item" onclick="selectP(${r.idx})">
      <div class="rec-book">《${r.book}》 · ${r.author}</div>
      <div class="rec-passage">${r.p}</div>
    </div>`).join('');
}

function getShareText(item = allP[cur]) {
  return `Philo 오늘의 철학\n\n《${item.book}》 · ${item.author}\n${item.ref}\n\n${item.p}\n\n#${item.cat.replace(/\s/g, '')}`;
}

function showToast(msg) {
  const t = document.getElementById('share-toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => t.classList.remove('show'), 1800);
}

async function copyShareText() {
  const text = getShareText();
  try {
    await navigator.clipboard.writeText(text);
    showToast('문구가 복사됐습니다');
  } catch (e) {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    showToast('문구가 복사됐습니다');
  }
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const chars = [...text];
  let line = '';
  for (const ch of chars) {
    const test = line + ch;
    if (ctx.measureText(test).width > maxWidth && line) {
      ctx.fillText(line, x, y);
      line = ch;
      y += lineHeight;
    } else {
      line = test;
    }
  }
  if (line) ctx.fillText(line, x, y);
  return y + lineHeight;
}

async function shareAsImage() {
  const item = allP[cur];

  // 을유1945 폰트를 FontFace API로 명시적 로드 후 완전히 준비될 때까지 대기
  try {
    const [r, s] = await Promise.all([
      new FontFace('Eulyoo1945', "url('./Eulyoo1945-Regular.woff2') format('woff2')", { weight: '400' }).load(),
      new FontFace('Eulyoo1945', "url('./Eulyoo1945-SemiBold.woff2') format('woff2')", { weight: '600' }).load()
    ]);
    document.fonts.add(r);
    document.fonts.add(s);
    await document.fonts.ready;
  } catch(e) {
    console.warn('폰트 로드 실패, 기본 폰트 사용:', e);
  }

  const canvas = document.createElement('canvas');
  canvas.width = 1080;
  canvas.height = 1350;
  const ctx = canvas.getContext('2d');

  // 배경
  ctx.fillStyle = '#F5F3EF';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#D8D3CB';
  ctx.lineWidth = 2;
  ctx.strokeRect(54, 54, canvas.width - 108, canvas.height - 108);

  // Philo 로고 — 을유1945
  ctx.fillStyle = '#1A1814';
  ctx.font = '600 52px "Eulyoo1945"';
  ctx.fillText('Philo', 104, 150);
  ctx.font = '400 24px "Eulyoo1945"';
  ctx.fillStyle = '#7A766E';
  ctx.fillText('오늘의 철학', 250, 150);

  // 책 정보 — 을유1945
  ctx.font = '600 34px "Eulyoo1945"';
  ctx.fillStyle = '#1A1814';
  ctx.fillText('《' + item.book + '》', 104, 250);
  ctx.font = '400 26px "Eulyoo1945"';
  ctx.fillStyle = '#7A766E';
  ctx.fillText(item.author, 104, 295);
  ctx.font = '400 22px "Eulyoo1945"';
  ctx.fillStyle = '#B0AB9F';
  ctx.fillText(item.ref, 104, 332);

  // 본문 — 을유1945
  ctx.font = '400 42px "Eulyoo1945"';
  ctx.fillStyle = '#1A1814';
  const endY = wrapText(ctx, item.p, 104, 432, 872, 78);

  // 하단 메타 — 을유1945
  ctx.font = '400 24px "Eulyoo1945"';
  ctx.fillStyle = '#7A766E';
  ctx.fillText(item.cat, 104, Math.min(endY + 70, 1230));
  ctx.fillStyle = '#B0AB9F';
  ctx.fillText(dateKey().replaceAll('-', '. '), 104, 1274);

  canvas.toBlob(async blob => {
    if (!blob) return;
    const file = new File([blob], 'philo-quote.png', { type: 'image/png' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: 'Philo 오늘의 철학', text: item.p });
        showToast('공유했습니다');
        return;
      } catch (e) {}
    }
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'philo-quote.png';
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('이미지가 저장됐습니다');
  }, 'image/png');
}

/* ── TAB ── */
function switchTab(tab) {
  currentTab = tab;
  ['scr-main','scr-cats','scr-detail','scr-saved'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('active');
  });
  ['home','cats','saved'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active-tab', t === tab);
  });
  if (tab === 'home') document.getElementById('scr-main').classList.add('active');
  else if (tab === 'cats') { renderCatList(); document.getElementById('scr-cats').classList.add('active'); }
  else if (tab === 'saved') { renderSaved(); document.getElementById('scr-saved').classList.add('active'); }
  document.querySelector('.scroll').scrollTop = 0;
}

/* ── CATS ── */
function renderCatList() {
  document.getElementById('cat-list').innerHTML = cats.map(c => `
    <div class="ccard" onclick="openCat('${c.id}')">
      <div class="cat-left">
        <div class="cat-title">${c.title}</div>
        <div class="cat-sub">${c.sub}</div>
        <div class="cat-books">${c.books.map(b => '《' + b.book + '》').join('  ·  ')}</div>
      </div>
      <div class="cat-arr">→</div>
    </div>`).join('');
}

function openCat(id) {
  const c = cats.find(x => x.id === id);
  ['scr-main','scr-cats','scr-saved'].forEach(sid => {
    const el = document.getElementById(sid);
    if (el) el.classList.remove('active');
  });
  document.getElementById('scr-detail').classList.add('active');
  document.querySelector('.scroll').scrollTop = 0;
  document.getElementById('det-title').textContent = c.title;
  document.getElementById('det-sub').textContent = c.sub;
  document.getElementById('det-list').innerHTML = c.books.map(b => `
    <div class="bsec">
      <div class="bsec-title">《${b.book}》</div>
      <div class="bsec-author">${b.author}</div>
      ${b.passages.map(pa => `
        <div class="bp-item" onclick="selectP(${allP.findIndex(x => x.p === pa.p)})">
          <div class="bp-ref">${pa.ref}</div>
          <div class="bp-preview">${pa.p}</div>
        </div>`).join('')}
    </div>`).join('<div class="hr-thin"></div>');
}

function selectP(idx) {
  if (idx < 0) return;
  cur = idx; render(allP[idx]);
  switchTab('home');
}

function goBack() {
  document.getElementById('scr-detail').classList.remove('active');
  if (currentTab === 'cats') {
    renderCatList();
    document.getElementById('scr-cats').classList.add('active');
  } else {
    document.getElementById('scr-main').classList.add('active');
    currentTab = 'home';
    ['home','cats','saved'].forEach(t =>
      document.getElementById('tab-' + t).classList.toggle('active-tab', t === 'home'));
  }
  document.querySelector('.scroll').scrollTop = 0;
}

/* ── SAVED ── */
function renderSaved() {
  const body = document.getElementById('saved-body');
  if (savedList.length === 0) {
    body.innerHTML = `
      <div class="saved-empty">
        <div class="saved-empty-title">저장한 문구가 없습니다</div>
        <div class="saved-empty-sub">문구를 읽다가 마음에 드는 것을<br>저장하기 버튼으로 담아두세요</div>
      </div>`;
    return;
  }
  body.innerHTML = `
    <div class="saved-count-lbl">${savedList.length}편 저장됨</div>
    <div class="saved-list">
      ${savedList.map((s, i) => `
        <div class="saved-item" onclick="goToSaved(${i})">
          <button class="del-btn" onclick="event.stopPropagation();deleteSaved(${i})">×</button>
          <div class="saved-item-book">《${s.item.book}》 · ${s.item.author}</div>
          <div class="saved-item-passage">${s.item.p}</div>
          <div class="saved-item-ref">${s.item.ref}</div>
        </div>`).join('')}
    </div>`;
}

function goToSaved(i) {
  cur = savedList[i].idx;
  render(allP[cur]);
  switchTab('home');
}

function deleteSaved(i) {
  savedList.splice(i, 1);
  persistSavedList();
  updateSavedLabel();
  syncSaveBtn();
  renderSaved();
}

/* ── INIT ── */
cur = Math.floor(Math.random() * allP.length);
updateStreak();
updateSavedLabel();
render(allP[cur]);
</script>
