<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Philo — 오늘의 철학</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111111;
    --bg-card: #1C1C1C;
    --bg-ele: #252525;
    --border: #2A2A2A;
    --border-h: #3A3A3A;
    --accent: #D9FF9A;
    --accent-dim: rgba(217,255,154,0.1);
    --accent-border: rgba(217,255,154,0.28);
    --accent-text: #111;
    --t1: #F0F0F0;
    --t2: #888888;
    --t3: #444444;
    --ff: 'Noto Sans KR', sans-serif;
    --fs: 'Noto Serif KR', serif;
    --r-md: 10px;
    --r-lg: 16px;
    --r-pill: 100px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #0a0a0a;
    font-family: var(--ff);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 16px 48px;
  }

  /* ── phone shell ── */
  .phone {
    width: 390px;
    background: var(--bg);
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 0 0.5px #2a2a2a, 0 40px 120px rgba(0,0,0,0.8);
  }
  .notch {
    width: 126px; height: 34px;
    background: #0a0a0a;
    border-radius: 0 0 20px 20px;
    margin: 0 auto;
    position: relative;
    z-index: 10;
  }

  /* ── orb bg ── */
  .orbs {
    position: absolute; top: 0; left: 0; right: 0; height: 260px;
    pointer-events: none; overflow: hidden; z-index: 0;
  }
  .orb {
    position: absolute; border-radius: 50%;
    filter: blur(55px);
  }
  .orb1 {
    width: 220px; height: 220px; top: -70px; left: -50px;
    background: radial-gradient(circle, rgba(74,124,89,0.55), transparent 70%);
  }
  .orb2 {
    width: 180px; height: 180px; top: -50px; right: -30px;
    background: radial-gradient(circle, rgba(143,184,74,0.38), transparent 70%);
  }
  .orb3 {
    width: 140px; height: 140px; top: 80px; left: 50%;
    transform: translateX(-50%);
    background: radial-gradient(circle, rgba(217,255,154,0.1), transparent 70%);
  }

  /* ── inner scroll ── */
  .scroll-area {
    position: relative; z-index: 1;
    max-height: 820px;
    overflow-y: auto;
    scrollbar-width: none;
  }
  .scroll-area::-webkit-scrollbar { display: none; }

  /* ── screens ── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── header ── */
  .hdr {
    padding: 16px 20px 14px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo-row { display: flex; align-items: center; gap: 10px; }
  .logo {
    width: 32px; height: 32px;
    background: var(--bg-ele);
    border: 0.5px solid var(--border-h);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--fs); font-size: 15px; font-weight: 300;
    color: var(--accent);
  }
  .aname { font-size: 14px; font-weight: 500; color: var(--t1); letter-spacing: -0.2px; }
  .asub { font-size: 10px; color: var(--t3); margin-top: 1px; letter-spacing: 0.3px; }
  .streak {
    display: flex; align-items: center; gap: 5px;
    background: rgba(217,255,154,0.1);
    border: 0.5px solid var(--accent-border);
    color: var(--accent);
    font-size: 11px; font-weight: 500;
    padding: 4px 11px; border-radius: var(--r-pill);
  }

  /* ── main content ── */
  .body { padding: 2px 16px 28px; display: flex; flex-direction: column; gap: 11px; }

  .date-row { display: flex; align-items: center; justify-content: space-between; padding: 0 2px; }
  .date-txt { font-size: 11px; color: var(--t3); letter-spacing: 0.3px; }
  .cat-pill {
    font-size: 10px; font-weight: 500;
    padding: 3px 11px; border-radius: var(--r-pill);
    background: var(--accent-dim); color: var(--accent);
    border: 0.5px solid var(--accent-border);
    letter-spacing: 0.3px;
  }

  /* passage card */
  .passage-card {
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    border-radius: var(--r-lg);
    padding: 20px 18px 18px;
    transition: border-color 0.2s;
  }
  .passage-card:hover { border-color: var(--border-h); }
  .book-row { display: flex; align-items: center; gap: 9px; margin-bottom: 14px; }
  .book-ico {
    width: 30px; height: 30px; border-radius: 7px;
    background: var(--bg-ele); border: 0.5px solid var(--border-h);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0;
  }
  .book-title { font-size: 11px; font-weight: 500; color: var(--t1); }
  .book-author { font-size: 10px; color: var(--t3); margin-top: 2px; letter-spacing: 0.2px; }
  .passage-text {
    font-family: var(--fs);
    font-size: 13.5px; font-weight: 400; line-height: 2.05;
    color: var(--t1); word-break: keep-all;
    border-left: 2px solid rgba(217,255,154,0.35);
    padding-left: 14px; border-radius: 0;
  }

  /* context box */
  .ctx-box {
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    border-radius: var(--r-lg);
    padding: 14px 16px;
  }
  .slbl {
    font-size: 9px; font-weight: 500;
    color: #666666; letter-spacing: 0.8px;
    text-transform: uppercase; margin-bottom: 8px;
  }
  .ctx-text { font-size: 12px; line-height: 1.85; color: #AAAAAA; word-break: keep-all; }

  /* keywords */
  .kw-row { display: flex; gap: 5px; flex-wrap: wrap; padding: 0 2px; }
  .kw {
    font-size: 10px; font-weight: 500;
    padding: 3px 10px; border-radius: var(--r-pill);
    background: var(--bg-ele); color: var(--t2);
    border: 0.5px solid var(--border-h);
    letter-spacing: 0.2px; cursor: pointer;
    transition: all 0.15s;
  }
  .kw:hover { border-color: var(--accent-border); color: var(--accent); }

  /* action buttons */
  .act-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .abtn {
    padding: 11px; border: 0.5px solid var(--border-h);
    border-radius: var(--r-md); background: transparent;
    font-family: var(--ff); font-size: 11px; font-weight: 500;
    color: var(--t2); cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: all 0.15s; letter-spacing: 0.2px;
  }
  .abtn:hover { border-color: var(--accent-border); color: var(--accent); background: var(--accent-dim); }
  .abtn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
  .abtn.saved { border-color: var(--accent-border); color: var(--accent); background: var(--accent-dim); }

  /* shuffle CTA */
  .shuffle-btn {
    width: 100%; padding: 13px;
    border-radius: var(--r-pill);
    background: var(--accent);
    font-family: var(--ff); font-size: 12px; font-weight: 500;
    color: var(--accent-text); cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    border: none; transition: opacity 0.15s, transform 0.1s;
  }
  .shuffle-btn:hover { opacity: 0.9; }
  .shuffle-btn:active { transform: scale(0.98); }
  .shuffle-btn svg { width: 14px; height: 14px; stroke: var(--accent-text); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

  /* divider */
  .divider { border: none; border-top: 0.5px solid var(--border); }
  .sec-hdr { font-size: 11px; font-weight: 500; color: #AAAAAA; padding: 0 2px; }

  /* cat cards */
  .cgrid { display: flex; flex-direction: column; gap: 8px; }
  .ccard {
    background: var(--bg-card); border: 0.5px solid var(--border);
    border-radius: var(--r-lg); overflow: hidden; cursor: pointer;
    transition: border-color 0.15s;
  }
  .ccard:hover { border-color: var(--border-h); }
  .chdr { padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; }
  .cleft { display: flex; align-items: center; gap: 9px; }
  .cicon {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--bg-ele); border: 0.5px solid var(--border-h);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0;
  }
  .ctitle { font-size: 13px; font-weight: 500; color: #F0F0F0; }
  .csub { font-size: 10px; color: #777777; margin-top: 2px; }
  .carr { font-size: 18px; color: #666666; transition: color 0.15s; }
  .ccard:hover .carr { color: #AAAAAA; }
  .cpills { padding: 0 14px 12px; display: flex; gap: 4px; flex-wrap: wrap; }
  .cpill {
    font-size: 10px; padding: 3px 9px;
    border-radius: var(--r-pill);
    border: 0.5px solid #3A3A3A;
    color: #AAAAAA; background: #252525;
    white-space: nowrap;
  }

  /* ── detail screen ── */
  .det-body { padding: 14px 16px 28px; display: flex; flex-direction: column; gap: 10px; }
  .backbtn {
    display: flex; align-items: center; gap: 6px;
    background: none; border: none;
    font-family: var(--ff); font-size: 12px;
    color: var(--t2); cursor: pointer;
    padding: 0; transition: color 0.12s; letter-spacing: 0.2px;
  }
  .backbtn:hover { color: var(--accent); }
  .backbtn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .dhdr {
    border-radius: var(--r-lg); padding: 14px;
    display: flex; align-items: center; gap: 11px;
    background: var(--bg-card); border: 0.5px solid var(--border);
  }
  .dico {
    width: 42px; height: 42px; border-radius: 10px;
    background: var(--bg-ele); border: 0.5px solid var(--border-h);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .dtitle { font-size: 15px; font-weight: 500; color: #F0F0F0; }
  .dsub { font-size: 10px; color: #888888; margin-top: 3px; line-height: 1.5; }

  .bcard {
    background: var(--bg-card); border: 0.5px solid var(--border);
    border-radius: var(--r-lg); padding: 13px 14px;
    transition: border-color 0.15s;
  }
  .bcard:hover { border-color: var(--border-h); }
  .btop { display: flex; align-items: center; gap: 9px; margin-bottom: 8px; }
  .bico2 {
    width: 32px; height: 32px; border-radius: 7px;
    background: var(--bg-ele); border: 0.5px solid var(--border-h);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0;
  }
  .bname { font-size: 12px; font-weight: 500; color: #F0F0F0; }
  .bauth { font-size: 10px; color: #777777; margin-top: 1px; }
  .bpassage {
    font-family: var(--fs); font-size: 11px; line-height: 1.85;
    color: var(--t2); word-break: keep-all;
    border-left: 2px solid rgba(217,255,154,0.25);
    padding-left: 10px; border-radius: 0;
  }
  .rbtn {
    margin-top: 10px; width: 100%; padding: 9px;
    border: 0.5px solid var(--border-h); border-radius: var(--r-md);
    background: transparent; font-family: var(--ff);
    font-size: 11px; font-weight: 500; color: var(--t2);
    cursor: pointer; transition: all 0.15s; letter-spacing: 0.2px;
  }
  .rbtn:hover { border-color: var(--accent-border); color: var(--accent); background: var(--accent-dim); }

  /* fade animation */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade { animation: fadeUp 0.25s ease forwards; }
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div class="orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="scroll-area">

    <!-- ── MAIN SCREEN ── -->
    <div class="screen active" id="scr-main">
      <div class="hdr">
        <div class="logo-row">
          <div class="logo">◈</div>
          <div><div class="aname">Philo</div><div class="asub">오늘의 철학</div></div>
        </div>
        <div class="streak">🔥 7일 연속</div>
      </div>

      <div class="body">
        <div class="date-row">
          <div class="date-txt" id="today-date"></div>
          <div class="cat-pill" id="today-cat"></div>
        </div>

        <div class="passage-card">
          <div class="book-row">
            <div class="book-ico" id="today-ico"></div>
            <div>
              <div class="book-title" id="today-book"></div>
              <div class="book-author" id="today-author"></div>
            </div>
          </div>
          <div class="passage-text" id="today-passage"></div>
        </div>

        <div class="ctx-box">
          <div class="slbl">이 문구에 대해</div>
          <div class="ctx-text" id="today-ctx"></div>
        </div>

        <div class="kw-row" id="today-kw"></div>

        <div class="act-row">
          <button class="abtn" id="save-btn" onclick="toggleSave()">
            <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            <span id="save-lbl">저장하기</span>
          </button>
          <button class="abtn" onclick="deepDive()">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            더 알아보기
          </button>
        </div>

        <button class="shuffle-btn" onclick="shufflePassage()">
          <svg viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
          다른 문구 보기
        </button>

        <hr class="divider">
        <div class="sec-hdr">카테고리</div>
        <div class="cgrid" id="cgrid"></div>
      </div>
    </div>

    <!-- ── DETAIL SCREEN ── -->
    <div class="screen" id="scr-detail">
      <div class="hdr">
        <div class="logo-row">
          <div class="logo">◈</div>
          <div><div class="aname">Philo</div><div class="asub">오늘의 철학</div></div>
        </div>
        <div class="streak">🔥 7일 연속</div>
      </div>
      <div class="det-body">
        <button class="backbtn" onclick="goBack()">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          전체 카테고리
        </button>
        <div class="dhdr" id="dhdr"></div>
        <div id="plist" style="display:flex;flex-direction:column;gap:8px"></div>
      </div>
    </div>

  </div>
</div>

<script>
const cats = [
  { id:'sad', icon:'🌧', title:'우울할 땐', sub:'무기력·슬픔·공허함이 찾아올 때', books:[
    { book:'니체의 말', author:'프리드리히 니체', ico:'⚡', cat:'우울할 땐',
      passage:'인간은 극복되어야 할 무언가다. 그대들은 벌레에서 인간이 되기까지 무엇을 해왔는가? 많은 것들이 그대들 안에서 여전히 벌레다. 한때 그대들은 원숭이였고, 지금도 인간은 어느 원숭이보다 더 원숭이 같다. 보라, 나는 그대들에게 위버멘쉬를 가르친다.',
      ctx:'《차라투스트라는 이렇게 말했다》 서문. 니체는 우울과 무기력을 현 상태로 직시하면서도, 그것이 끝이 아닌 출발점임을 선언한다. 지금의 고통은 더 나은 존재로 나아가는 과정이다.',
      kw:['위버멘쉬','극복','변화','고통'] },
    { book:'페스트', author:'알베르 카뮈', ico:'🌊', cat:'우울할 땐',
      passage:'부조리한 세계에 맞서 저항하는 것. 패배할 것을 알면서도 싸우는 것. 영웅이 되는 것이 아니라, 단지 인간이 되는 것. 그것만으로도 충분하다.',
      ctx:'카뮈는 거창한 해결 대신 오늘 하루 버티는 것, 그것이 이미 충분한 용기임을 말한다.',
      kw:['부조리','연대','저항','인간'] },
    { book:'죽음의 수용소에서', author:'빅터 프랭클', ico:'✦', cat:'우울할 땐',
      passage:'모든 것을 빼앗길 수 있다. 인간의 마지막 자유, 즉 주어진 환경에서 자신의 태도를 선택하고 자신의 길을 선택하는 자유만 빼고는. 고통에도 의미가 있다면, 그것은 더 이상 고통이 아니다.',
      ctx:'아우슈비츠 생존자 프랭클의 기록. 가장 극한의 상황에서도 인간은 태도를 선택할 수 있다는 통찰은, 우울의 한가운데서도 작은 선택의 여지가 있음을 상기시킨다.',
      kw:['의미','자유','태도','로고테라피'] },
    { book:'의지와 표상으로서의 세계', author:'쇼펜하우어', ico:'🪞', cat:'우울할 땐',
      passage:'삶은 고통이다. 존재 자체가 결핍이며, 욕망은 채워지면 곧 권태가 된다. 그러나 이 진실을 정면으로 응시하는 자는, 더 이상 세상에 속지 않는다. 인식이 곧 해방의 시작이다.',
      ctx:'고통을 부정하지 않고 직시할 때 오히려 연민과 예술 속에서 일시적 해방을 찾을 수 있다는 역설적 위로다.',
      kw:['고통','의지','인식','해방'] },
    { book:'육조단경', author:'혜능', ico:'☯', cat:'우울할 땐',
      passage:'본래 한 물건도 없는데 어디에 먼지가 앉으랴. 마음이 곧 부처요, 부처가 곧 마음이다. 마음 밖에서 부처를 찾지 말라. 미혹하면 중생이요, 깨치면 부처다.',
      ctx:'선종 6조 혜능의 핵심 가르침. 우울과 괴로움은 실체가 없는 마음의 먼지임을 직시하는 순간 힘을 잃는다.',
      kw:['선종','공','본성','마음'] }
  ]},
  { id:'anxious', icon:'🌀', title:'불안할 땐', sub:'두려움·걱정·미래가 막막할 때', books:[
    { book:'명상록', author:'마르쿠스 아우렐리우스', ico:'🏛', cat:'불안할 땐',
      passage:'네가 잠에서 깨어나기 어렵다고 느낄 때 이렇게 생각하라. 나는 인간으로서 해야 할 일을 하기 위해 일어나는 것이다. 그 일을 위해 내가 태어났고, 그 일을 위해 세상에 왔다. 현재 이 순간에 집중하라. 과거는 이미 없고, 미래는 아직 없다.',

      passage:'마음이 모든 것에 앞선다. 마음이 주(主)가 되어 모든 것을 만든다. 더럽혀진 마음으로 말하거나 행동하면 괴로움이 따른다. 깨끗한 마음으로 말하거나 행동하면 행복이 그림자처럼 따른다.',
      ctx:'불교 경전 법구경의 첫 구절. 의미는 외부에서 오지 않는다. 의미 있는 삶을 원한다면 먼저 마음을 다스리는 것이 출발점이다.',
      kw:['마음','깨달음','업','행복'] },
    { book:'논어', author:'공자', ico:'📜', cat:'의미를 찾을 땐',
      passage:'나는 열다섯에 배움에 뜻을 두었고, 서른에 자립했으며, 마흔에 흔들리지 않았고, 쉰에 하늘의 뜻을 알았으며, 예순에 귀가 순해졌고, 일흔에 마음이 하고자 하는 대로 해도 법도를 어기지 않았다.',
      ctx:'공자의 자기 서사. 의미 있는 삶은 한 번에 완성되지 않는다. 지금 내 나이에 맞는 과업이 곧 의미다.',
      kw:['성장','수양','자기서사','군자'] }
  ]}
];

const allBooks = cats.flatMap(c => c.books);
let curIdx = 0, saved = false;

function getDate() {
  const d = new Date();
  return d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일';
}

function renderPassage(b) {
  document.getElementById('today-date').textContent = getDate();
  document.getElementById('today-cat').textContent = b.cat;
  document.getElementById('today-ico').textContent = b.ico;
  document.getElementById('today-book').textContent = '《' + b.book + '》';
  document.getElementById('today-author').textContent = b.author;
  document.getElementById('today-passage').textContent = b.passage;
  document.getElementById('today-ctx').textContent = b.ctx;
  document.getElementById('today-kw').innerHTML = b.kw.map(k => `<span class="kw">#${k}</span>`).join('');
  saved = false;
  const btn = document.getElementById('save-btn');
  btn.classList.remove('saved');
  document.getElementById('save-lbl').textContent = '저장하기';
  document.querySelector('.passage-card').classList.add('fade');
  setTimeout(() => document.querySelector('.passage-card').classList.remove('fade'), 300);
}

function shufflePassage() {
  let n = (curIdx + 1 + Math.floor(Math.random() * (allBooks.length - 1))) % allBooks.length;
  curIdx = n;
  renderPassage(allBooks[curIdx]);
  document.querySelector('.scroll-area').scrollTop = 0;
}

function toggleSave() {
  saved = !saved;
  const btn = document.getElementById('save-btn');
  btn.classList.toggle('saved', saved);
  document.getElementById('save-lbl').textContent = saved ? '저장됨 ✓' : '저장하기';
}

function deepDive() {
  const b = allBooks[curIdx];
  alert('📖 《' + b.book + '》\n\n' + b.ctx + '\n\n키워드: ' + b.kw.map(k=>'#'+k).join(' '));
}

function renderCats() {
  document.getElementById('cgrid').innerHTML = cats.map(c => `
    <div class="ccard" onclick="openCat('${c.id}')">
      <div class="chdr">
        <div class="cleft">
          <div class="cicon">${c.icon}</div>
          <div><div class="ctitle">${c.title}</div><div class="csub">${c.sub}</div></div>
        </div>
        <div class="carr">›</div>
      </div>
      <div class="cpills">${c.books.map(b => `<span class="cpill">《${b.book}》</span>`).join('')}</div>
    </div>
  `).join('');
}

function openCat(id) {
  const c = cats.find(x => x.id === id);
  document.getElementById('scr-main').classList.remove('active');
  document.getElementById('scr-detail').classList.add('active');
  document.querySelector('.scroll-area').scrollTop = 0;
  document.getElementById('dhdr').innerHTML = `
    <div class="dico">${c.icon}</div>
    <div><div class="dtitle">${c.title}</div><div class="dsub">${c.sub} · 책 ${c.books.length}권</div></div>
  `;
  document.getElementById('plist').innerHTML = c.books.map(b => `
    <div class="bcard">
      <div class="btop">
        <div class="bico2">${b.ico}</div>
        <div><div class="bname">《${b.book}》</div><div class="bauth">${b.author}</div></div>
      </div>
      <div class="bpassage">${b.passage.slice(0, 60)}...</div>
      <button class="rbtn" onclick="readBook('${b.book}','${c.id}')">이 문구 읽기 →</button>
    </div>
  `).join('');
}

function goBack() {
  document.getElementById('scr-detail').classList.remove('active');
  document.getElementById('scr-main').classList.add('active');
  document.querySelector('.scroll-area').scrollTop = 0;
}

function readBook(book, catId) {
  const c = cats.find(x => x.id === catId);
  const b = c.books.find(x => x.book === book);
  if (b) { curIdx = allBooks.indexOf(b); renderPassage(b); goBack(); }
}

curIdx = Math.floor(Math.random() * allBooks.length);
renderPassage(allBooks[curIdx]);
renderCats();
</script>
</body>
</html>
